<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Manual approval to directed autonomy metaphor</title>
  <desc id="desc">A diagonal split poster background showing a car being pushed on the left and a plane taxiing along branching runways on the right.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b12"/>
      <stop offset="48%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="55%" stop-color="#58a6ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="runway" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e263f" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#07111e" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <style>
      .thin { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .cyan { stroke: #58a6ff; }
      .orange { stroke: #f0883e; }
      .green { stroke: #3fb950; }
      .muted { stroke: #8b949e; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect width="1280" height="720" fill="url(#rightGlow)"/>
  <path d="M0 0h716L604 720H0z" fill="url(#leftGlow)"/>

  <!-- diagonal transition -->
  <path d="M720 -40 596 760" stroke="#58a6ff" stroke-width="2" opacity="0.35"/>
  <path d="M744 -30 620 750" stroke="#d2a8ff" stroke-width="1" opacity="0.18"/>
  <path d="M692 -35 568 755" stroke="#58a6ff" stroke-width="28" opacity="0.035"/>

  <!-- distant destination glow -->
  <circle cx="1134" cy="155" r="98" fill="#f0883e" opacity="0.12" filter="url(#blur)"/>
  <circle cx="830" cy="232" r="120" fill="#58a6ff" opacity="0.08" filter="url(#blur)"/>

  <!-- branching runway -->
  <path d="M725 650 C810 560 865 478 898 378 C925 296 966 225 1046 178" class="thin cyan" stroke-width="5" opacity="0.65"/>
  <path d="M735 650 C870 573 1005 482 1180 418" class="thin orange" stroke-width="4" opacity="0.62"/>
  <path d="M735 650 C842 612 910 613 1006 667" class="thin green" stroke-width="4" opacity="0.45"/>
  <path d="M708 656 C800 544 850 470 874 365" class="thin muted" stroke-width="1.5" opacity="0.35"/>

  <!-- runway lights -->
  <g opacity="0.9">
    <circle cx="756" cy="615" r="5" fill="#58a6ff"/>
    <circle cx="795" cy="568" r="4" fill="#58a6ff"/>
    <circle cx="832" cy="512" r="4" fill="#58a6ff"/>
    <circle cx="866" cy="441" r="4" fill="#58a6ff"/>
    <circle cx="898" cy="369" r="4" fill="#58a6ff"/>
    <circle cx="940" cy="291" r="4" fill="#58a6ff"/>
    <circle cx="1002" cy="211" r="4" fill="#58a6ff"/>
    <circle cx="816" cy="604" r="4" fill="#f0883e"/>
    <circle cx="903" cy="548" r="4" fill="#f0883e"/>
    <circle cx="1001" cy="501" r="4" fill="#f0883e"/>
    <circle cx="1102" cy="455" r="4" fill="#f0883e"/>
  </g>

  <!-- plane silhouette -->
  <g transform="translate(815 455) rotate(-12)" filter="url(#shadow)">
    <ellipse cx="190" cy="86" rx="148" ry="26" fill="#182538" stroke="#58a6ff" stroke-opacity="0.45"/>
    <path d="M56 83 8 50 112 65z" fill="#122034" stroke="#58a6ff" stroke-opacity="0.28"/>
    <path d="M194 79 286 20 254 86z" fill="#13243a" stroke="#58a6ff" stroke-opacity="0.34"/>
    <path d="M194 91 306 154 256 94z" fill="#0f1b2d" stroke="#58a6ff" stroke-opacity="0.32"/>
    <path d="M315 80 370 36 362 94z" fill="#13243a" stroke="#f0883e" stroke-opacity="0.3"/>
    <circle cx="81" cy="91" r="10" fill="#0d1117" stroke="#8b949e" opacity="0.75"/>
    <circle cx="299" cy="91" r="10" fill="#0d1117" stroke="#8b949e" opacity="0.75"/>
    <circle cx="156" cy="75" r="8" fill="#58a6ff" opacity="0.55"/>
  </g>

  <!-- car and pushers, kept low and away from text -->
  <g transform="translate(74 548)" filter="url(#shadow)">
    <path d="M78 66 C95 24 128 14 196 18 L244 50 C270 51 290 67 298 92 L51 92 C54 78 63 70 78 66z" fill="#17263c" stroke="#58a6ff" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="108" y="33" width="56" height="28" rx="8" fill="#0d1728" stroke="#79c0ff" stroke-opacity="0.38"/>
    <rect x="171" y="34" width="48" height="27" rx="8" fill="#0d1728" stroke="#79c0ff" stroke-opacity="0.3"/>
    <circle cx="100" cy="94" r="25" fill="#070b12" stroke="#8b949e" stroke-width="4"/>
    <circle cx="238" cy="94" r="25" fill="#070b12" stroke="#8b949e" stroke-width="4"/>
    <circle cx="100" cy="94" r="8" fill="#58a6ff" opacity="0.45"/>
    <circle cx="238" cy="94" r="8" fill="#58a6ff" opacity="0.45"/>
    <path d="M47 85 C24 84 10 70 11 52" class="thin cyan" stroke-width="5" opacity="0.75"/>
    <circle cx="10" cy="38" r="14" fill="#58a6ff" opacity="0.72"/>
    <path d="M18 54 35 68 46 80" class="thin cyan" stroke-width="6" opacity="0.7"/>
    <path d="M318 80 C338 72 350 58 351 42" class="thin orange" stroke-width="5" opacity="0.7"/>
    <circle cx="352" cy="28" r="13" fill="#f0883e" opacity="0.72"/>
    <path d="M340 43 325 60 312 75" class="thin orange" stroke-width="6" opacity="0.68"/>
  </g>

  <!-- foreground vignette and text safety gradient -->
  <rect width="1280" height="720" fill="#000" opacity="0.18"/>
  <rect width="760" height="720" fill="url(#sky)" opacity="0.56"/>
  <path d="M0 0h740L650 720H0z" fill="#070b12" opacity="0.42"/>
  <rect width="1280" height="720" fill="none" stroke="#58a6ff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
